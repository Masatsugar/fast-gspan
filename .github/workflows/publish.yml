name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:  # allow manual trigger for testing

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheel (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: macos-latest          # arm64 (Apple Silicon)
            platform: macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake g++ make

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake libomp

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel

      - name: Inspect wheel contents
        run: |
          echo "=== Wheel file ==="
          ls -lh dist/*.whl
          echo "=== Binary and bundled libs ==="
          python -m zipfile -l dist/*.whl | grep -E "(gbolt|\.so|\.dylib)"

      - name: Verify wheel works
        run: |
          pip install dist/*.whl
          python -c "
          from fast_gspan import FastgSpan
          import networkx as nx
          graphs = []
          for _ in range(10):
              g = nx.Graph()
              g.add_node(0, label=1); g.add_node(1, label=2)
              g.add_edge(0, 1, label=1)
              graphs.append(g)
          df = FastgSpan(min_support=2, max_num_vertices=5).run_from_graphs(graphs)
          assert len(df) > 0, 'No patterns found'
          print(f'OK: {len(df)} patterns mined')
          "

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.platform }}
          path: dist/*.whl

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    if: github.event_name == 'release'
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # for trusted publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
